name: Deploy to Beget VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create .env.local for build
        working-directory: next-app
        run: |
          cat > .env.local << 'EOF'
          ${{ secrets.ENV_FILE }}
          EOF

      - name: Install dependencies & Build
        working-directory: next-app
        run: |
          npm install
          npm run build

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 5.35.86.145
          username: root
          password: zZ3U8x8s%QAo
          source: "next-app"
          target: "/root/intelligent-trails/"
          rm: true

      - name: Setup environment and restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 5.35.86.145
          username: root
          password: zZ3U8x8s%QAo
          script: |
            cd /root/intelligent-trails/next-app
            
            # Создаём .env.local на сервере
            cat > .env.local << 'EOF'
            ${{ secrets.ENV_FILE }}
            EOF
            
            npm install --production
            pm2 restart intelligent-trails || pm2 start npm --name "intelligent-trails" -- start
            pm2 save